default_model = "deepseek/deepseek-v4-flash"
[permissions]
allow = ["Bash(echo \"=== Checking Java ===\" && (java -version 2>&1 || echo \"Java not found\") && echo \"=== Checking JAVAC ===\" && (javac -version 2>&1 || echo \"javac not found\") && echo \"=== Checking Gradle ===\" && (gradle --version 2>&1 || echo \"Gradle not found\") && echo \"=== Checking ADB ===\" && (adb --version 2>&1 || echo \"adb not found\") && echo \"=== Checking ANDROID_HOME ===\" && (echo \"ANDROID_HOME=${ANDROID_HOME:-<not set>}\" && echo \"ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<not set>}\" && echo \"JAVA_HOME=${JAVA_HOME:-<not set>}\"))"]


[[providers]]
name        = "deepseek-flash"
kind        = "openai"
base_url    = "https://api.deepseek.com"
model       = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"
context_window = 1000000
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }

[[providers]]
name        = "deepseek-pro"
kind        = "openai"
base_url    = "https://api.deepseek.com"
model       = "deepseek-v4-pro"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"
context_window = 1000000
price       = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" }

[[providers]]
name        = "deepseek"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-flash", "deepseek-v4-pro"]
default     = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"
context_window = 1000000
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }
prices      = { "deepseek-v4-flash" = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }, "deepseek-v4-pro" = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" } }

